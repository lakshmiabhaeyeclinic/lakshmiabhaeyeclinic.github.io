<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Laxmi Abha Eye Care Wellness Center</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f8fb;
}

/* Header */

header{
    background:#0077b6;
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    margin-bottom:10px;
}

/* Navigation */

nav{
    background:#023e8a;
    display:flex;
    justify-content:center;
}

nav a{
    color:white;
    text-decoration:none;
    padding:15px 25px;
    transition:0.3s;
}

nav a:hover{
    background:#0077b6;
}

/* Login Box */

.container{
    width:90%;
    max-width:400px;
    margin:60px auto;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    text-align:center;
}

.card h2{
    color:#0077b6;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:15px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    background:#0077b6;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#023e8a;
}

/* Footer */

footer{
    margin-top:60px;
    background:#023e8a;
    color:white;
    text-align:center;
    padding:15px;
}

</style>

</head>

<body>

<header>

<h1>🏥 Laxmi Abha Eye Care Wellness Center</h1>

<p>Your Vision Our Priority</p>

</header>

<nav>

<a href="home_page.html">Home</a>
<a href="about_doctor.html">About Doctor</a>
<a href="gallery.html">Gallery</a>
<a href="login.html">Patient Registration</a>
<a href="login.html">Patients</a>

</nav>

<div class="container">

<div class="card">

<h2>Staff Login</h2>

<p>Please enter the password to continue.</p>

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="checkPassword()">Login</button>

</div>

</div>

<footer>

<p>© 2026 Laxmi Abha Eye Care Wellness Center | All Rights Reserved</p>

</footer>

<script>

function checkPassword(){

    const password = document.getElementById("password").value;

    if(password === "1234"){

        window.location.href = "patient_registration.html";

    }
    else{

        alert("Incorrect password!");

    }

}

</script>

</body>
</html>
