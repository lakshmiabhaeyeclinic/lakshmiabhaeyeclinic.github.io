<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | Laxmi Abha Eye Care Wellness Center</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f8fb;
}

/* Header */

header{
    background:#0077b6;
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    margin-bottom:10px;
}

/* Navigation */

nav{
    background:#023e8a;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

nav a{
    color:white;
    text-decoration:none;
    padding:15px 25px;
    transition:.3s;
}

nav a:hover{
    background:#0077b6;
}

/* Hero */

.hero{
    background:#ff8c00;
    color:white;
    text-align:center;
    padding:70px 20px;
}

.hero h1{
    font-size:40px;
    margin-bottom:10px;
}

/* Gallery */

.gallery{
    width:95%;
    max-width:1400px;
    margin:50px auto;
}

.gallery h2{
    text-align:center;
    color:#0077b6;
    margin-bottom:30px;
    font-size:34px;
}

/* PHOTO GRID */

.photo-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

    gap:25px;

}

.photo-grid img{

    width:100%;

    height:250px;

    object-fit:cover;

    border-radius:12px;

    box-shadow:0 5px 15px rgba(0,0,0,.25);

    transition:.3s;

}

.photo-grid img:hover{

    transform:scale(1.05);

}

/* VIDEO GRID */

.video-grid{

    display:flex;

    justify-content:center;

    gap:35px;

    flex-wrap:wrap;

    margin-top:20px;

}

.video-grid video{

    width:300px;

    height:540px;

    object-fit:cover;

    border-radius:12px;

    box-shadow:0 5px 15px rgba(0,0,0,.3);

}

/* Footer */

footer{

    margin-top:70px;

    background:#023e8a;

    color:white;

    text-align:center;

    padding:20px;

}

@media(max-width:700px){

.hero h1{

font-size:30px;

}

.gallery h2{

font-size:28px;

}

.video-grid video{

width:250px;

height:450px;

}

}

</style>

</head>

<body>

<header>
